name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-node-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-node-app:latest

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull shatatarakau/demo-node-app:latest
            docker stop app || true
            docker rm app || true
            docker run -d -p 80:3000 --name app shatatarakau/demo-node-app:latest
            
